# Name of your application. Used to uniquely configure containers.
service: ponto

# Name of the container image (use your-user/app-name on external registries).
image: ponto

# Deploy to these servers.
servers:
  web:
    - 10.0.0.10 # LXC 108 "ponto" no Proxmox (Ubuntu 26.04)

# Enable SSL auto certification via Let's Encrypt and allow for multiple apps on a single web server.
# If used with Cloudflare, set encryption mode in SSL/TLS setting to "Full" to enable CF-to-app encryption.
#
# Using an SSL proxy like this requires turning on config.assume_ssl and config.force_ssl in production.rb!
#
# Don't use this when deploying to multiple web servers (then you have to terminate SSL at your load balancer).
#
# pontotracker.com entra por CLOUDFLARE TUNNEL: o TLS termina na borda da
# Cloudflare e o cloudflared entrega HTTP interno pro kamal-proxy (ingress →
# http://10.0.0.10:80). Sem Let's Encrypt aqui (ssl: false) — o app confia
# no https externo via assume_ssl/force_ssl no production.rb.
proxy:
  ssl: false
  host: pontotracker.com

# Where you keep your container images.
registry:
  # Registry permanente NO PRÓPRIO LXC (container ponto-registry, volume
  # registry_data). Fixo — e não localhost:5555 — porque deployamos de DUAS
  # origens (desktop e o próprio servidor): o modo local-registry do Kamal
  # abre um túnel SSH que dá bind-conflict quando o builder É o alvo.
  # Requer "insecure-registries": ["10.0.0.10:5555"] no daemon.json de
  # QUEM builda (HTTP puro, ok na LAN do homelab).
  server: 10.0.0.10:5555

  # O registry do homelab NÃO tem auth (LAN); o Kamal exige as chaves mesmo
  # assim — credencial dummy (o docker login passa trivialmente sem auth).
  username: ponto
  password:
    - KAMAL_REGISTRY_PASSWORD

  # Needed for authenticated registries.
  # username: your-user

  # Always use an access token rather than real password when possible.
  # password:
  #   - KAMAL_REGISTRY_PASSWORD

# Inject ENV variables into containers (secrets come from .kamal/secrets).
env:
  secret:
    - RAILS_MASTER_KEY
  clear:
    # Jobs rodam no Solid Queue embutido no Puma (production.rb) — mantém um
    # container só e persiste jobs longos como o importador Clockify.
    SOLID_QUEUE_IN_PUMA: 'true'

    # Host público (links dos e-mails de magic code) e remetente (Resend — 04/07).
    APP_HOST: pontotracker.com
    MAILER_FROM: Ponto <ponto@send.pontotracker.com>

    # Bootstrap do 1º admin (Q37): com o banco vazio, só este e-mail cria conta.
    ADMIN_EMAIL: admin@example.com

    # Set number of processes dedicated to Solid Queue (default: 1)
    # JOB_CONCURRENCY: 3

    # Set number of cores available to the application on each server (default: 1).
    # WEB_CONCURRENCY: 2

    # Match this to any external database server to configure Active Record correctly
    # Use ponto-db for a db accessory server on same machine via local kamal docker network.
    # DB_HOST: 10.0.0.20

    # Log everything from Rails
    # RAILS_LOG_LEVEL: debug

# Aliases are triggered with "bin/kamal <alias>". You can overwrite arguments on invocation:
# "bin/kamal logs -r job" will tail logs from the first server in the job section.
aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"

# Use a persistent storage volume for sqlite database files and local Active Storage files.
# Recommended to change this to a mounted volume path that is backed up off server.
volumes:
  - "ponto_storage:/rails/storage"

# Bridge fingerprinted assets, like JS and CSS, between versions to avoid
# hitting 404 on in-flight requests. Combines all files from new and old
# version inside the asset_path.
asset_path: /rails/public/assets

# Configure the image builder.
builder:
  arch: amd64

  # Build SEMPRE no servidor (local: false + remote): quem deploya (desktop OU
  # o próprio LXC) só dispara — o build/push roda no buildkit do LXC.
  # ⚠️ O buildkit NÃO lê insecure-registries do daemon: o builder buildx é
  # PRÉ-CRIADO com .kamal/buildkitd.toml (http=true pro registry) usando o
  # nome exato que o Kamal deriva da URL ("kamal-remote-ssh---root-192-168-
  # 0-187") — o Kamal reusa builders existentes. Ver docs/deploy.md.
  remote: ssh://root@10.0.0.10
  local: false

  # # Build image via remote server (useful for faster amd64 builds on arm64 computers)
  # remote: ssh://docker@docker-builder-server
  #
  # # Pass arguments and secrets to the Docker build process
  # args:
  #   RUBY_VERSION: ruby-4.0.5
  # secrets:
  #   - GITHUB_TOKEN
  #   - RAILS_MASTER_KEY

# Use a different ssh user than root
# ssh:
#   user: app

# Use accessory services (secrets come from .kamal/secrets).
# accessories:
#   db:
#     image: mysql:8.0
#     host: 10.0.0.20
#     # Change to 3306 to expose port to the world instead of just local network.
#     port: "127.0.0.1:3306:3306"
#     env:
#       clear:
#         MYSQL_ROOT_HOST: '%'
#       secret:
#         - MYSQL_ROOT_PASSWORD
#     files:
#       - config/mysql/production.cnf:/etc/mysql/my.cnf
#       - db/production.sql:/docker-entrypoint-initdb.d/setup.sql
#     directories:
#       - data:/var/lib/mysql
#   redis:
#     image: valkey/valkey:8
