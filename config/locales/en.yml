# English translation of the landing copy (Q79). Marketing tone: direct,
# specific, sales-driven — mirroring the canonical pt-BR (config/locales/pt-BR.yml).
# Full key coverage on purpose: fallbacks point at :"pt-BR", so any missing key
# would leak Portuguese onto the English page. Keep this file complete.
#
# `_html` keys carry the same embedded markup (<strong>/<br>/&nbsp;) the original
# copy had; the text is still our own copy, no user data interpolated.
en:
  landing:
    meta:
      title: "Ponto — self-hosted time tracker for people who bill by the hour"
      description: "Self-hosted time tracker for people who bill by the hour: one-click timer, clear reports, and a monthly .xlsx/CSV export ready to become an invoice."
    nav:
      links_label: "Links"
      github: "GitHub"
      sign_in: "Sign in"
    lang_switcher:
      pt: "Português"
      en: "English"
    hero:
      eyebrow: "Self-hosted time tracker"
      title_html: "Track your time.<br>The report becomes the invoice."
      lede: "Built for people who bill by the hour: a one-click timer, per-client hourly rates, and a monthly export that's ready to become an invoice. Runs on your own server — your data stays with you."
    cloud:
      pitch_html: "Don't want to self-host? Use <strong>Ponto Cloud</strong> — this very instance, for just <strong>US$ 1/month</strong><sup>*</sup>. Access is invite-only: request yours."
    proofs:
      heading: "From timer to invoice, without leaving the app"
      sub_html: "The timer stays at the top of every screen. Organize work as Client&nbsp;→&nbsp;Project&nbsp;→&nbsp;Task.<br>Set each client's hourly rate (in&nbsp;dollars, euros…) and export the report at month's end."
      reports:
        title: "Reports that close out the month"
        text_html: "Hours per day, breakdown by project, and two-level grouping — from summary to detail. Export to <strong>.xlsx or CSV</strong> and attach it straight to the invoice."
      extension:
        title: "Chrome extension"
        badge: "coming soon"
        text: "Start and stop the timer right from the popup, without switching tabs. It's the same API as the app — the server stays the source of truth."
      cli:
        title: "CLI"
        badge: "coming soon"
        badge_available: "available"
        text: "Terminal commands and JSON output for AI agents, like Claude. Available now — build from source and connect to your instance with the same token as the extension."
    gallery:
      heading: "See inside"
      sub: "Ponto's real screens — from the timer up top to the report that becomes an invoice."
      shots:
        tracker:
          title: "Tracker"
          text: "The timer on top of everything; the day's history right below, grouped and totaled."
          alt: "Ponto tracker screen with the timer and the day's time entries"
        reports:
          title: "Reports"
          text: "Summary with charts and the detailed view grouped by day — ready to export."
          alt: "Ponto reports screen with donut, per-day bars and the detailed list"
        projects:
          title: "Projects"
          text: "Each project with its color, client, logged hours and hourly rate."
          alt: "Ponto projects screen with the project list and logged hours"
        export:
          title: "Export"
          text: "The month's report in .xlsx or CSV, ready to attach to the invoice."
          alt: "Ponto report export menu in xlsx and CSV"
        preferences:
          title: "Preferences"
          text: "Profile, time zone, theme and the extension and CLI tokens in one place."
          alt: "Ponto preferences screen with profile, time zone and theme"
    frozen:
      heading: "History always preserved"
      sub: "Every entry keeps the hourly rate from the day it was logged. Raised a client's rate? The new rate applies from here on out — history stays intact and old invoices stay correct."
      now: "current rate"
      lock_title: "frozen"
    host:
      heading: "Self-host in 4 steps"
      sub_html: "A single Rails app with SQLite. The repo already ships the Dockerfile and Kamal config — and the %{readme_link} is the full guide."
      readme: "README"
      steps:
        clone:
          title: "Clone the repository"
          text_html: "<code>git clone</code> onto your server — or your own machine, to give it a try."
        deploy:
          title: "Deploy with Docker or Kamal"
          text_html: "<code>kamal setup</code> (or <code>docker build</code> by hand) — the <code>Dockerfile</code> and <code>config/deploy.yml</code> are already in the repo."
        configure:
          title_html: "Set <code>ADMIN_EMAIL</code> and SMTP"
          text: "Sign-in is passwordless: a 6-digit code arrives by email. Configure SMTP in the credentials and set the admin's email."
        bootstrap:
          title: "The first sign-in creates the admin"
          text_html: "With an empty database, the first sign-in using <code>ADMIN_EMAIL</code> creates the admin account. From there, invite whoever you want."
    stack:
      heading: "Light to run on your homelab"
      backup:
        key: "Backup = copy a folder"
        value_html: "SQLite: your data is <code>.sqlite3</code> files in a folder — backup is copying it (or a volume snapshot). No database server to run."
      no_node:
        key: "Zero Node, zero build"
        value: "Rails 8 + Hotwire with importmap. No JavaScript pipeline."
      your_data:
        key: "Your data is yours"
        value: "Each account is an isolated bubble — the admin manages access but has no screen to see your clients, projects, or entries. And since it's self-hosted, the server is yours."
      portability:
        key: "Portable, always"
        value: "Export everything that's yours, whenever you want — nothing is locked in here."
      open_source:
        key: "Open source (O'Saasy)"
        value_html: "Read it, audit it, contribute. Host it wherever you like — just don't resell it as a SaaS. %{github_link}."
        github_link: "See it on GitHub"
      multiuser:
        key: "Multi-user, no teams"
        value: "Each account stays isolated from the others; access is invite-only."
    final:
      heading: "Request access to Ponto Cloud"
      sub_html: "Don't want to self-host? Use this instance for <strong>US$ 1/month</strong><sup>*</sup>. Leave your email — approved requests get the invite in their inbox.<br>Prefer to host it yourself? The code is on %{github_link}."
      github_link: "GitHub"
      signin_prompt: "Already have an account?"
    footer:
      nav_label: "Footer"
      promo_note: "* US$ 1/month is a promotional price. If it ever changes, you'll be told first."
    mockups:
      tracker:
        project_a: "Kubernetes homelab"
        project_b: "Client app"
        project_c: "Consulting"
        desc_running: "ingress migration"
        desc_cert: "wildcard certificate"
        desc_review: "code review"
        desc_scope: "scoping meeting"
        stop: "Stop"
      extension:
        title: "Ponto"
        project: "Client app"
        stop: "Stop timer"
      terminal:
        cmd1: "ponto timer start --project kube"
        status: "ok"
        result1: " timer running · Kubernetes homelab"
        cmd2: "ponto timer show --jq .data.elapsed"
        out2: '"01:47:12"'
