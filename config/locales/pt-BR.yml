# Copy pt-BR bilíngue (Q79). Esta é a FONTE CANÔNICA — a copy pt-BR do
# app; a en.yml é a tradução. Landing e app interno devem ter cobertura completa.
#
# Chaves HTML (`_html`): o Rails marca como html_safe. Usamos só onde a copy
# original tinha <strong>/<br>/&nbsp; embutidos; o texto continua sendo a nossa
# copy, sem interpolação de dado do usuário.
pt-BR:
  landing:
    meta:
      title: "Ponto — time tracker self-hosted para quem cobra por hora"
      description: "Time tracker self-hosted para quem cobra por hora: timer de um clique, relatórios claros e exportação mensal em .xlsx/CSV pronta para virar fatura."
    nav:
      links_label: "Links"
      github: "GitHub"
      sign_in: "Entrar"
    lang_switcher:
      pt: "Português"
      en: "English"
    hero:
      eyebrow: "Time tracker self-hosted"
      title_html: "Cronometre o trabalho.<br>O relatório vira fatura."
      lede: "Feito para quem cobra por hora: timer de um clique, valor-hora por cliente e uma exportação mensal pronta para virar fatura. Roda no seu servidor — seus dados ficam com você."
    cloud:
      pitch_html: "Não quer hospedar? Use o <strong>Ponto Cloud</strong> — esta instância, por apenas <strong>US$ 1/mês</strong><sup>*</sup>. O acesso é por convite: peça o seu."
    proofs:
      heading: "Do timer à fatura, sem sair do app"
      sub_html: "O timer fica no topo de todas as telas. Organize o trabalho em Cliente&nbsp;→&nbsp;Projeto&nbsp;→&nbsp;Tarefa.<br>Defina o valor-hora de cada cliente (em&nbsp;real, euro…) e, no fim do mês, exporte o relatório."
      reports:
        title: "Relatórios que fecham o mês"
        text_html: "Horas por dia, distribuição por projeto e agrupamentos em dois níveis — do resumo ao detalhe. Exporte em <strong>.xlsx ou CSV</strong> e anexe direto à fatura."
      extension:
        title: "Extensão de Chrome"
        badge: "em breve"
        text: "Inicie e pare o timer direto do popup, sem trocar de aba. É a mesma API do app — o servidor continua sendo a fonte da verdade."
      cli:
        title: "CLI"
        badge: "em breve"
        text: "Comandos no terminal e saída JSON para agentes de IA, como o Claude. Usa o mesmo token da extensão."
    frozen:
      heading: "Histórico sempre mantido"
      sub: "Cada lançamento guarda o valor-hora do dia em que foi registrado. Reajustou um cliente? O novo valor vale só daqui para a frente — o histórico permanece intacto e as faturas antigas continuam corretas."
      now: "rate atual"
      lock_title: "congelado"
    host:
      heading: "Self-host em 4 passos"
      sub_html: "Uma única aplicação Rails com SQLite. O repositório já traz o Dockerfile e a configuração do Kamal — e o %{readme_link} é o guia completo."
      readme: "README"
      steps:
        clone:
          title: "Clone o repositório"
          text_html: "<code>git clone</code> no seu servidor — ou na sua máquina, para experimentar."
        deploy:
          title: "Deploy com Docker ou Kamal"
          text_html: "<code>kamal setup</code> (ou <code>docker build</code> na mão) — o <code>Dockerfile</code> e o <code>config/deploy.yml</code> já estão no repo."
        configure:
          title_html: "Configure <code>ADMIN_EMAIL</code> e SMTP"
          text: "O login é sem senha: um código de 6 dígitos chega por e-mail. Configure o SMTP nas credenciais e defina o e-mail do administrador."
        bootstrap:
          title: "O primeiro acesso cria o administrador"
          text_html: "Com o banco vazio, o primeiro login com o <code>ADMIN_EMAIL</code> cria a conta de administrador. A partir dela, convide quem quiser."
    stack:
      heading: "Leve de operar no seu homelab"
      backup:
        key: "Backup = copiar uma pasta"
        value_html: "SQLite: os dados são arquivos <code>.sqlite3</code> numa pasta — backup é copiá-la (ou um snapshot do volume). Sem servidor de banco pra administrar."
      no_node:
        key: "Zero Node, zero build"
        value: "Rails 8 + Hotwire com importmap. Sem pipeline de JavaScript."
      your_data:
        key: "Seus dados são seus"
        value: "Cada conta é uma bolha isolada — o admin gerencia acessos, mas não tem tela para ver seus clientes, projetos ou lançamentos. E como é self-hosted, o servidor é seu."
      portability:
        key: "Portabilidade sempre"
        value: "Exporte tudo o que é seu, quando quiser — nada fica preso aqui."
      open_source:
        key: "Código aberto (O'Saasy)"
        value_html: "Leia, audite, contribua. Hospede onde quiser — apenas não revenda como SaaS. %{github_link}."
        github_link: "Veja no GitHub"
      multiuser:
        key: "Multiusuário, sem times"
        value: "Cada conta vive isolada das demais; o acesso é por convite."
    final:
      heading: "Peça acesso ao Ponto Cloud"
      sub_html: "Não quer hospedar? Use esta instância por <strong>US$ 1/mês</strong><sup>*</sup>. Deixe seu e-mail — os pedidos aprovados recebem o convite na caixa de entrada.<br>Prefere hospedar você mesmo? O código está no %{github_link}."
      github_link: "GitHub"
      signin_prompt: "Já tem conta?"
    footer:
      nav_label: "Rodapé"
      promo_note: "* US$ 1/mês é um preço promocional. Se um dia mudar, você é avisado antes."
    mockups:
      tracker:
        project_a: "Kubernetes homelab"
        project_b: "App do cliente"
        project_c: "Consultoria"
        desc_running: "migração do ingress"
        desc_cert: "certificado wildcard"
        desc_review: "code review"
        desc_scope: "reunião de escopo"
        stop: "Parar"
      extension:
        title: "Ponto"
        project: "App do cliente"
        stop: "Parar timer"
      terminal:
        cmd1: "ponto timer start --project kube"
        status: "ok"
        result1: " timer correndo · Kubernetes homelab"
        cmd2: "ponto timer show --jq .data.elapsed"
        out2: '"01:47:12"'
