# Copy da landing bilíngue (Q79). Esta é a FONTE CANÔNICA — a copy pt-BR do
# copy pass do Alex, verbatim. A en.yml é a tradução. Só a landing é traduzida;
# o resto do app segue com strings hardcoded PT (fora de escopo).
#
# Chaves HTML (`_html`): o Rails marca como html_safe. Usamos só onde a copy
# original tinha <strong>/<br>/&nbsp; embutidos; o texto continua sendo a nossa
# copy, sem interpolação de dado do usuário.
pt-BR:
  landing:
    meta:
      title: "Ponto — time tracker self-hosted para quem cobra por hora"
      description: "Time tracker self-hosted para quem cobra por hora: timer de um clique, relatórios claros e exportação mensal em .xlsx/CSV pronta para virar fatura."
    nav:
      links_label: "Links"
      github: "GitHub"
      sign_in: "Entrar"
    lang_switcher:
      pt: "Português"
      en: "English"
    hero:
      eyebrow: "Time tracker self-hosted"
      title_html: "Marque o ponto.<br>O relatório vira fatura."
      lede: "Feito para quem cobra por hora: timer de um clique, valor-hora por cliente e uma exportação mensal pronta para virar fatura. Roda no seu servidor — seus dados ficam com você."
    cloud:
      pitch_html: "Não quer hospedar? Use o <strong>Ponto Cloud</strong> — esta instância, por apenas <strong>US$ 1/mês</strong>. O acesso é por convite: peça o seu."
