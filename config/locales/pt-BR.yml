  # Mensagens de erro de validação do Active Record em pt-BR (default do app).
  # NÃO é a suíte completa do rails-i18n — só as chaves que a nossa UI de fato
  # exibe ao usuário (User#email presence/uniqueness/format + a exceção
  # RecordInvalid reembrulhada em User#suspend!). Validações customizadas usam
  # strings literais no próprio model, então não passam por aqui.
  errors:
    forbidden: "forbidden"
    format: "%{attribute} %{message}"
    messages:
      record_invalid: "A validação falhou: %{errors}"
      blank: "não pode ficar em branco"
      taken: "já está em uso"
      invalid: "não é válido"
      inclusion: "não está incluído na lista"
      overlap: "se sobrepõe à entrada %{range}"
  activerecord:
    errors:
      messages:
        record_invalid: "A validação falhou: %{errors}"
        blank: "não pode ficar em branco"
        taken: "já está em uso"
        invalid: "não é válido"
        inclusion: "não está incluído na lista"
