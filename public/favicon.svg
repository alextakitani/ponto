<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Ponto">
  <!--
    Versão SIMPLIFICADA da marca (docs/logo-mark.svg) para favicon: em 16px o
    detalhe fino vira mancha. Removidos p/ legibilidade em tamanho mínimo:
    alavanca lateral (grupo #lever), venezianas laterais (.slot), a grade fina
    do cartão (.thin) e o ponteiro fino. Mantidos: gabinete, mostrador, marcas
    de hora, um ponteiro grosso, contorno do cartão e os furos.
  -->
  <defs>
    <style>
      .dark { fill: #1f2829; }
      .cream { fill: #f4ead2; }
      .line { stroke: #1f2829; stroke-width: 8; stroke-linecap: round; stroke-linejoin: round; fill: none; }
      .slot { stroke: #f4ead2; stroke-width: 18; stroke-linecap: round; stroke-linejoin: round; fill: none; }
    </style>
  </defs>

  <!-- Main punch-clock body -->
  <rect class="dark" x="248" y="122" width="528" height="620" rx="72"/>

  <!-- Clock face -->
  <circle class="cream" cx="512" cy="350" r="178"/>
  <circle cx="512" cy="350" r="158" fill="none" stroke="#1f2829" stroke-width="12"/>

  <!-- Hour marks (cardinais + diagonais principais) -->
  <g class="dark">
    <rect x="500" y="194" width="24" height="46" rx="4"/>
    <rect x="500" y="460" width="24" height="46" rx="4"/>
    <rect x="352" y="338" width="46" height="24" rx="4"/>
    <rect x="626" y="338" width="46" height="24" rx="4"/>
  </g>

  <!-- Single bold clock hand -->
  <g class="dark" stroke="#1f2829" stroke-linecap="round" stroke-linejoin="round">
    <line x1="512" y1="350" x2="512" y2="250" stroke-width="32"/>
    <circle cx="512" cy="350" r="30"/>
  </g>

  <!-- Card slot -->
  <path class="slot" d="M336 596 V574 Q336 562 348 562 H676 Q688 562 688 574 V596"/>
  <rect class="dark" x="332" y="570" width="360" height="48" rx="12"/>

  <!-- Punch card (contorno só) -->
  <path class="cream" d="M360 588 H664 V856 L632 888 H392 L360 856 Z"/>
  <path class="line" d="M360 588 H664 V856 L632 888 H392 L360 856 Z"/>

  <!-- Punch holes (poucos, grandes) -->
  <g class="dark">
    <circle cx="450" cy="680" r="18"/>
    <circle cx="450" cy="760" r="18"/>
    <circle cx="450" cy="840" r="18"/>

    <circle cx="580" cy="720" r="18"/>
    <circle cx="580" cy="800" r="18"/>
  </g>
</svg>
